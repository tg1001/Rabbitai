version: "3.8"

services:
  backend:
    build: ./server
    container_name: rabbitai-backend
    ports:
      - "4000:4000"
    env_file:
      - ./server/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    container_name: rabbitai-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
